{% extends 'home.html' %}
{% load static %}

{% block content %}
<style>
    .auth-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.8s ease-out;
    }

    .auth-card h2 {
        margin-bottom: 30px;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent-color);
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        color: var(--text-dim);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        padding: 12px 15px;
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
        outline: none;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: var(--accent-color);
        background: rgba(255, 255, 255, 0.1);
    }

    .btn-login {
        width: 100%;
        background: var(--accent-color);
        color: var(--primary-bg);
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-login:hover {
        box-shadow: 0 0 20px var(--accent-color);
        transform: translateY(-2px);
    }

    .auth-footer {
        margin-top: 25px;
        font-size: 14px;
        color: var(--text-dim);
    }

    .auth-footer a {
        color: var(--accent-color);
        text-decoration: none;
    }
</style>

<div class="auth-card">
    <h2>User Login</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div style="background: rgba(255,85,85,0.1); color: #ff5555; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid rgba(255,85,85,0.2);">
                <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Access Portal</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
</div>
{% endblock %}
