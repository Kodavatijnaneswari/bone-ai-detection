{% extends 'home.html' %}
{% load static %}

{% block content %}
<style>
    .auth-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.8s ease-out;
    }

    .auth-card h2 {
        margin-bottom: 25px;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent-color);
    }

    /* Style the Django form tags */
    .auth-card form p {
        margin-bottom: 20px;
        text-align: left;
    }

    .auth-card label {
        display: block;
        font-size: 13px;
        color: var(--text-dim);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .auth-card input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        padding: 12px 15px;
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
        outline: none;
        transition: 0.3s;
    }

    .auth-card input:focus {
        border-color: var(--accent-color);
        background: rgba(255, 255, 255, 0.1);
    }

    .helptext {
        display: block;
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 5px;
        opacity: 0.7;
    }

    .btn-submit {
        width: 100%;
        background: var(--accent-color);
        color: var(--primary-bg);
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        box-shadow: 0 0 20px var(--accent-color);
        transform: translateY(-2px);
    }

    .auth-footer {
        margin-top: 25px;
        font-size: 14px;
        color: var(--text-dim);
    }

    .auth-footer a {
        color: var(--accent-color);
        text-decoration: none;
    }
</style>

<div class="auth-card">
    <h2>Clinical Registration</h2>
    
    {% if message %}
        <div style="background: rgba(100,255,218,0.1); color: var(--accent-color); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid rgba(100,255,218,0.2);">
            <i class="fa-solid fa-circle-check"></i> {{ message }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="{% url 'userlogin' %}">Log in here</a>
    </div>
</div>
{% endblock %}
