{% extends 'users/userbase.html' %}
{% load static %}

{% block extra_head %}
<style>
    .upload-section {
        width: 100%;
        max-width: 600px;
        animation: fadeIn 0.8s ease-out;
    }

    .drop-zone {
        height: 300px;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        border: 2px dashed var(--glass-border);
        border-radius: 20px;
        background: var(--glass-bg);
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .drop-zone:hover, .drop-zone.drag-over {
        border-color: var(--accent-color);
        background: rgba(100, 255, 218, 0.05);
    }

    .drop-zone i {
        font-size: 50px;
        color: var(--accent-color);
        margin-bottom: 15px;
    }

    .drop-zone p {
        color: var(--text-dim);
        font-size: 16px;
    }

    .preview-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none;
        padding: 10px;
        background: var(--primary-bg);
    }

    #file-input {
        display: none;
    }

    .btn-submit {
        width: 100%;
        margin-top: 20px;
        background: var(--accent-color);
        color: var(--primary-bg);
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: none; /* Shown after selection */
    }

    .btn-submit:hover {
        box-shadow: 0 0 20px var(--accent-color);
        transform: translateY(-2px);
    }

    /* --- Scanning Animation --- */
    .scanning-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 25, 47, 0.9);
        backdrop-filter: blur(8px);
        z-index: 2000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .scanner-line {
        width: 300px;
        height: 2px;
        background: var(--accent-color);
        box-shadow: 0 0 15px var(--accent-color);
        position: absolute;
        animation: scan 2s infinite ease-in-out;
    }

    @keyframes scan {
        0% { top: 20%; }
        50% { top: 80%; }
        100% { top: 20%; }
    }

    .loader-text {
        margin-top: 40px;
        font-size: 20px;
        color: var(--accent-color);
        letter-spacing: 2px;
    }
</style>
{% endblock %}

{% block content %}
<div class="upload-section">
    <div class="glass-card">
        <h2 style="margin-bottom: 30px; color: var(--accent-color);">Radiology Input</h2>
        <form id="upload-form" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="drop-zone" id="drop-zone">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Drag & Drop X-ray image here or <strong>browse</strong></p>
                <img id="preview" class="preview-img" alt="Preview">
                <input type="file" name="image" id="file-input" required accept="image/*">
            </div>
            <button type="submit" class="btn-submit" id="submit-btn" onclick="showScanner()">
                <i class="fa-solid fa-bolt"></i> Run AI Analysis
            </button>
        </form>
    </div>
</div>

<!-- Scanning Overlay -->
<div class="scanning-overlay" id="scanner">
    <div style="position: relative; width: 300px; height: 300px; border: 1px solid var(--glass-border);">
        <div class="scanner-line"></div>
        <img id="scanner-preview" style="width: 100%; height: 100%; object-fit: contain; opacity: 0.3;">
    </div>
    <div class="loader-text">AI IS ANALYZING BONE STRUCTURE...</div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const scannerPreview = document.getElementById('scanner-preview');
    const submitBtn = document.getElementById('submit-btn');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = e => handleFiles(e.target.files);

    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        fileInput.files = e.dataTransfer.files;
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        if (files.length > 0) {
            const file = files[0];
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                scannerPreview.src = e.target.result;
                submitBtn.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function showScanner() {
        if (fileInput.files.length > 0) {
            document.getElementById('scanner').style.display = 'flex';
        }
    }
</script>
{% endblock %}
