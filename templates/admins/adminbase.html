<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoneAI Admin | Management Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0a192f;
            --accent-color: #00d2ff; /* Distinct blue for Admin */
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 210, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(10, 25, 47, 0.5) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(10, 25, 47, 0.8);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar .menu {
            display: flex;
            gap: 25px;
        }

        .navbar .menu a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .navbar .menu a:hover, .navbar .menu a.active {
            color: var(--accent-color);
            background: rgba(0, 210, 255, 0.05);
        }

        .admin-container {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .navbar .menu { display: none; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-user-shield"></i>
            <span>BoneAI Admin</span>
        </div>
        <div class="menu">
            <a href="{% url 'adminhome' %}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="{% url 'view' %}"><i class="fa-solid fa-users"></i> Users</a>
            <a href="{% url 'index' %}" style="color: #ff5555;"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>
    </nav>

    <main class="admin-container">
        {% block content %}{% endblock %}
    </main>

    <footer style="padding: 30px; text-align: center; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--glass-border); margin-top: auto;">
        BoneAI System Administration &copy; 2026. Secure Protocol v2.4
    </footer>

    <script>
        // Simple active link handler
        const currentPath = window.location.pathname;
        document.querySelectorAll('.navbar .menu a').forEach(link => {
            if(link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
